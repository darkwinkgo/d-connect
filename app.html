<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dusit Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --green:#06C755;--green-dk:#05a847;--green-lt:#e8f9ed;
  --red:#ef4444;--red-lt:#fef2f2;
  --orange:#f97316;--orange-lt:#fff7ed;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --yellow:#d97706;--yellow-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --gray:#6b7280;--gray-lt:#f3f4f6;
  --text:#111827;--border:#e5e7eb;--white:#fff;--bg:#f9fafb;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column;position:relative}

/* Header */
.hdr{background:var(–white);border-bottom:1px solid var(–border);padding:12px 16px 0;position:sticky;top:0;z-index:40}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hdr-title{font-size:16px;font-weight:700}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.b-sup{background:#fef3c7;color:#92400e}
.b-hk{background:var(–green-lt);color:var(–green-dk)}
.b-fd{background:var(–blue-lt);color:#1e40af}
.b-mgr{background:var(–purple-lt);color:var(–purple)}
.hdr-sub{font-size:12px;color:var(–gray);margin-bottom:8px}

/* Tabs */
.tabs{display:flex;border-top:1px solid var(–border)}
.tab{flex:1;padding:10px 4px;font-family:‘Sarabun’,sans-serif;font-size:12px;font-weight:600;color:var(–gray);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.on{color:var(–green);border-bottom-color:var(–green)}

/* Content */
.page{flex:1;padding:12px;overflow-y:auto;display:none}
.page.on{display:block}

/* Cards */
.card{background:var(–white);border:1.5px solid var(–border);border-radius:var(–r);padding:13px;margin-bottom:10px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rnum{font-size:22px;font-weight:700;line-height:1}
.rfloor{font-size:11px;color:var(–gray);margin-top:2px}
.rinfo{font-size:13px;color:var(–gray);margin-bottom:8px}
.rinfo b{color:var(–text)}
.rnote{font-size:12px;color:var(–red);background:var(–red-lt);padding:6px 10px;border-radius:8px;margin-bottom:8px}

/* Status badges */
.s{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.s-pending{background:var(–gray-lt);color:#374151}
.s-cleaning{background:var(–orange-lt);color:#c2410c}
.s-done{background:var(–yellow-lt);color:var(–yellow)}
.s-passed{background:var(–green-lt);color:var(–green-dk)}
.s-ack{background:#f0fdf4;color:#166534}

/* Buttons */
.btn{height:38px;padding:0 14px;border:none;border-radius:9px;font-family:‘Sarabun’,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:active{opacity:.75;transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.bg{background:var(–green);color:#fff}
.br{background:var(–red);color:#fff}
.bb{background:var(–blue);color:#fff}
.bo{background:var(–orange);color:#fff}
.bw{background:var(–gray-lt);color:var(–text)}
.btn-lg{height:48px;font-size:15px;width:100%;justify-content:center;margin-top:8px}

/* Filter chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border:1.5px solid var(–border);border-radius:20px;font-size:12px;font-weight:600;color:var(–gray);background:var(–white);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{border-color:var(–green);background:var(–green-lt);color:var(–green-dk)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(–white);border:1.5px solid var(–border);border-radius:var(–r);padding:10px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:var(–gray);margin-top:2px}

/* Progress */
.prog{margin-bottom:10px}
.prog-hd{display:flex;justify-content:space-between;font-size:12px;color:var(–gray);margin-bottom:4px}
.prog-bar{height:6px;background:var(–gray-lt);border-radius:20px;overflow:hidden}
.prog-fill{height:100%;background:var(–green);border-radius:20px;transition:width .4s}

/* Chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;width:56px;flex-shrink:0;text-align:right;color:var(–gray)}
.bar-fill{height:18px;background:var(–green);border-radius:4px;min-width:3px;transition:width .4s}
.bar-val{font-size:11px;font-weight:700;white-space:nowrap}

/* Section label */
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(–gray);margin:14px 0 8px}

/* Empty */
.empty{text-align:center;padding:44px 16px;color:var(–gray)}
.empty-ic{font-size:36px;margin-bottom:10px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(–white);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:390px;max-height:85vh;overflow-y:auto}
.modal-hd{width:32px;height:4px;background:var(–border);border-radius:20px;margin:0 auto 14px}
.modal-room{font-size:30px;font-weight:700;text-align:center;color:var(–green)}
.modal-fl{font-size:12px;color:var(–gray);text-align:center;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}

/* Form */
.field{margin-bottom:12px}
.field label{font-size:13px;font-weight:600;display:block;margin-bottom:5px}
select,textarea,input[type=text]{width:100%;padding:10px 12px;border:1.5px solid var(–border);border-radius:9px;font-family:‘Sarabun’,sans-serif;font-size:15px;color:var(–text);background:var(–white);outline:none;-webkit-appearance:none;transition:border-color .2s}
select:focus,textarea:focus,input:focus{border-color:var(–green)}
textarea{height:74px;resize:none;line-height:1.5}
.sw{position:relative}
.sw::after{content:“▾”;position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(–gray);pointer-events:none}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(–text);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(–green)}
.toast.err{background:var(–red)}

/* Role switcher (dev) */
.dev-bar{background:#1f2937;padding:8px 12px;display:flex;gap:6px;overflow-x:auto}
.dev-btn{padding:4px 12px;border:1px solid #374151;border-radius:20px;font-size:11px;font-weight:700;color:#9ca3af;background:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
.dev-btn.on{background:#374151;color:#fff}

/* Divider */
.divider{height:1px;background:var(–border);margin:12px 0}

/* Actions row */
.acts{display:flex;gap:6px;flex-wrap:wrap}
</style>

</head>
<body>

<div class="app" id="app">

  <!-- Dev role switcher -->

  <div class="dev-bar" id="dev-bar">
    <span style="color:#6b7280;font-size:11px;line-height:28px;flex-shrink:0">ทดสอบ:</span>
    <button class="dev-btn on" onclick="switchRole('supervisor')">👑 หัวหน้า</button>
    <button class="dev-btn" onclick="switchRole('housekeeper')">🧹 แม่บ้าน</button>
    <button class="dev-btn" onclick="switchRole('frontdesk')">🛎 Front Desk</button>
    <button class="dev-btn" onclick="switchRole('manager')">📊 ผู้จัดการ</button>
  </div>

  <!-- Header -->

  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">🏨 Dusit Connect</div>
      <div class="badge b-sup" id="role-badge">👑 หัวหน้า</div>
    </div>
    <div class="hdr-sub" id="hdr-name">สมชาย หัวหน้า</div>
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- Pages -->

  <div id="pages"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── LIFF CONFIG ────────────────────────────────────
const LIFF_ID = "2009946209-cFt4JqH1";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyBSlxsIqNsxW7fO0vhsbgvJeKC783a0lQXvkChO-Sm_UofN9pZ0Xu3ceLxEF9M0s_vNg/exec";

// ─── STATE ──────────────────────────────────────────
const S = {
  role: "supervisor",
  userId: "SUP001",
  name: "สมชาย หัวหน้า",
  tabIdx: 0,
  filter: "all"
};

// ─── MOCK DATA ──────────────────────────────────────
const STAFF = [
  { id:"HK001", name:"สมหญิง ใจดี",  nick:"หญิง" },
  { id:"HK002", name:"มาลี รักงาน",  nick:"มาลี" },
  { id:"HK003", name:"นุ่น สวยงาม",  nick:"นุ่น"  },
  { id:"HK004", name:"แอ๊ม ขยัน",    nick:"แอ๊ม"  },
];

// สร้าง rooms mock
const ROOMS = (function(){
  const st = ["pending","cleaning","done","passed","ack"];
  const rows = [];
  let i = 0;
  for(let f=8;f<=14;f++){
    if(f===13) continue;
    for(let n=1;n<=8;n++){
      const id = String(f)+String(n).padStart(2,"0");
      if(id.endsWith("4")) continue;
      const hk = STAFF[i%STAFF.length];
      const status = st[i%st.length];
      rows.push({
        id, floor:f,
        status,
        assignedTo:   hk.id,
        assignedName: hk.nick,
        startTime: ["cleaning","done","passed","ack"].includes(status) ? Date.now()-Math.floor(Math.random()*5400000) : null,
        endTime:   ["done","passed","ack"].includes(status)            ? Date.now()-Math.floor(Math.random()*1800000) : null,
        note: status==="pending" && i%7===0 ? "แขกพิเศษ — ต้องการผ้าเช็ดตัวพิเศษ" : ""
      });
      i++;
    }
  }
  return rows;
})();

// ─── ROLE CONFIG ────────────────────────────────────
const ROLE_PROFILES = {
  supervisor:  { id:"SUP001", name:"สมชาย หัวหน้า",    badge:"👑 หัวหน้า",    cls:"b-sup" },
  housekeeper: { id:"HK001",  name:"สมหญิง ใจดี",      badge:"🧹 แม่บ้าน",   cls:"b-hk"  },
  frontdesk:   { id:"FD001",  name:"วิชัย ต้อนรับดี",  badge:"🛎 Front Desk", cls:"b-fd"  },
  manager:     { id:"MGR001", name:"พิมพ์ใจ บริหาร",   badge:"📊 ผู้จัดการ",  cls:"b-mgr" },
};

const TABS = {
  supervisor:  [{ lbl:"ห้องทั้งหมด", view:"sup_rooms" },{ lbl:"Assign", view:"sup_assign" }],
  housekeeper: [{ lbl:"ห้องของฉัน", view:"hk_rooms" }],
  frontdesk:   [{ lbl:"รอรับทราบ",  view:"fd_ack"   }],
  manager:     [{ lbl:"Dashboard",  view:"mgr_dash" },{ lbl:"ห้องทั้งหมด", view:"mgr_all" }],
};

// ─── STATUS HELPERS ─────────────────────────────────
const SL = { pending:"รอทำ", cleaning:"กำลังทำ", done:"รอตรวจ", passed:"ผ่านตรวจ", ack:"รับทราบ" };
function sb(st){ return `<span class="s s-${st}">${SL[st]||st}</span>`; }
function elapsed(ms){
  if(!ms) return "";
  const m = Math.floor((Date.now()-ms)/60000);
  return m<60 ? `${m} นาที` : `${Math.floor(m/60)} ชม. ${m%60} นาที`;
}

// ─── RENDER ENGINE ──────────────────────────────────
function render(){
  const p = ROLE_PROFILES[S.role];
  // badge
  const b = document.getElementById("role-badge");
  b.textContent = p.badge;
  b.className = "badge "+p.cls;
  document.getElementById("hdr-name").textContent = p.name;

  // dev bar highlight
  document.querySelectorAll(".dev-btn").forEach(btn=>{
    btn.classList.toggle("on", btn.textContent.includes({supervisor:"หัวหน้า",housekeeper:"แม่บ้าน",frontdesk:"Front",manager:"ผู้จัดการ"}[S.role]));
  });

  // tabs
  const tbs = TABS[S.role]||[];
  document.getElementById("tabs").innerHTML = tbs.map((t,i)=>
    `<button class="tab ${i===S.tabIdx?"on":""}" onclick="goTab(${i})">${t.lbl}</button>`
  ).join("");

  // pages
  const view = tbs[S.tabIdx]?.view;
  document.getElementById("pages").innerHTML = `<div class="page on" id="main-page">${renderView(view)}</div>`;
}

function goTab(i){ S.tabIdx=i; S.filter="all"; render(); }

function renderView(v){
  switch(v){
    case "sup_rooms":  return vSupRooms();
    case "sup_assign": return vSupAssign();
    case "hk_rooms":   return vHkRooms();
    case "fd_ack":     return vFdAck();
    case "mgr_dash":   return vMgrDash();
    case "mgr_all":    return vMgrAll();
    default: return `<div class="empty"><div class="empty-ic">🚧</div>กำลังพัฒนา</div>`;
  }
}

// ─── SUPERVISOR: ห้องทั้งหมด ────────────────────────
function vSupRooms(){
  const all = ROOMS;
  const flist = ["all","done","cleaning","pending","passed","ack"];
  const flbl  = {all:"ทั้งหมด",done:"รอตรวจ",cleaning:"กำลังทำ",pending:"รอทำ",passed:"ผ่านตรวจ",ack:"รับทราบ"};
  const shown = S.filter==="all" ? all : all.filter(r=>r.status===S.filter);

  return `
    <div class="chips">
      ${flist.map(f=>`<div class="chip ${S.filter===f?"on":""}" onclick="setF('${f}')">${flbl[f]} (${f==="all"?all.length:all.filter(r=>r.status===f).length})</div>`).join("")}
    </div>
    ${shown.length===0?`<div class="empty"><div class="empty-ic">✅</div>ไม่มีห้องในสถานะนี้</div>`:""}
    ${shown.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">ชั้น ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        ${r.note?`<div class="rnote">📋 ${r.note}</div>`:""}
        <div class="rinfo">แม่บ้าน: <b>${r.assignedName}</b>${r.startTime?` · <b>${elapsed(r.startTime)}</b>`:""}</div>
        <div class="acts">
          ${r.status==="done"?`<button class="btn bg" onclick="openInspect('${r.id}')">🔍 ตรวจห้อง</button>`:""}
          ${["pending","cleaning"].includes(r.status)?`<button class="btn bw" onclick="openAssign('${r.id}')">🔄 Re-assign</button>`:""}
          ${r.status==="passed"?`<div style="font-size:12px;color:var(--green-dk)">✅ ผ่านการตรวจ</div>`:""}
          ${r.status==="ack"?`<div style="font-size:12px;color:#166534">✅ รับทราบแล้ว</div>`:""}
        </div>
      </div>
    `).join("")}
  `;
}

// ─── SUPERVISOR: Assign ────────────────────────────
function vSupAssign(){
  const unassigned = ROOMS.filter(r=>r.status==="pending");
  return `
    <div class="sec">ห้องที่รอ Assign (${unassigned.length})</div>
    ${unassigned.length===0?`<div class="empty"><div class="empty-ic">🎉</div>Assign ครบทุกห้องแล้ว</div>`:""}
    ${unassigned.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">ชั้น ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        ${r.note?`<div class="rnote">📋 ${r.note}</div>`:""}
        <div class="rinfo">แม่บ้านปัจจุบัน: <b>${r.assignedName||"—"}</b></div>
        <div class="acts">
          <button class="btn bg" onclick="openAssign('${r.id}')">+ Assign แม่บ้าน</button>
        </div>
      </div>
    `).join("")}
  `;
}

// ─── HOUSEKEEPER ───────────────────────────────────
function vHkRooms(){
  const myRooms = ROOMS.filter(r=>r.assignedTo===S.userId);
  const done = myRooms.filter(r=>["done","passed","ack"].includes(r.status)).length;
  const pct  = myRooms.length ? Math.round(done/myRooms.length*100) : 0;
  return `
    <div class="stats">
      <div class="stat"><div class="stat-n" style="color:var(--green)">${done}</div><div class="stat-l">เสร็จแล้ว</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--orange)">${myRooms.filter(r=>r.status==="cleaning").length}</div><div class="stat-l">กำลังทำ</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--gray)">${myRooms.filter(r=>r.status==="pending").length}</div><div class="stat-l">รอทำ</div></div>
    </div>
    <div class="prog">
      <div class="prog-hd"><span>ความคืบหน้าวันนี้</span><span>${done}/${myRooms.length} ห้อง (${pct}%)</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    ${myRooms.length===0?`<div class="empty"><div class="empty-ic">📋</div>ยังไม่มีห้องที่ได้รับมอบหมาย</div>`:""}
    ${myRooms.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">ชั้น ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        ${r.note?`<div class="rnote">📋 ${r.note}</div>`:""}
        ${r.status==="cleaning"&&r.startTime?`<div class="rinfo">เริ่มมาแล้ว <b>${elapsed(r.startTime)}</b></div>`:""}
        <div class="acts">
          ${r.status==="pending"  ?`<button class="btn bg" onclick="doStatus('${r.id}','cleaning')">▶ เริ่มทำ</button>`:""}
          ${r.status==="cleaning" ?`<button class="btn bb" onclick="doStatus('${r.id}','done')">✓ เสร็จแล้ว</button>`:""}
          ${r.status==="done"     ?`<div style="font-size:12px;color:var(--yellow)">⏳ รอหัวหน้าตรวจ</div>`:""}
          ${r.status==="passed"   ?`<div style="font-size:12px;color:var(--green-dk)">✅ ผ่านการตรวจ</div>`:""}
          ${r.status==="ack"      ?`<div style="font-size:12px;color:#166534">✅ Front Desk รับทราบแล้ว</div>`:""}
        </div>
      </div>
    `).join("")}
  `;
}

// ─── FRONT DESK ─────────────────────────────────────
function vFdAck(){
  const rooms = ROOMS.filter(r=>r.status==="passed");
  return `
    <div class="sec">ห้องพร้อม Check-in (${rooms.length})</div>
    ${rooms.length===0?`<div class="empty"><div class="empty-ic">⏳</div>ยังไม่มีห้องพร้อม</div>`:""}
    ${rooms.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">ชั้น ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        <div class="rinfo">ทำความสะอาดโดย: <b>${r.assignedName}</b></div>
        ${r.endTime?`<div class="rinfo">ใช้เวลา <b>${elapsed(r.startTime)}</b></div>`:""}
        <div class="acts">
          <button class="btn bg" onclick="doAck('${r.id}')">✓ รับทราบ — ห้องพร้อม</button>
        </div>
      </div>
    `).join("")}
  `;
}

// ─── MANAGER: Dashboard ────────────────────────────
function vMgrDash(){
  const total = ROOMS.length;
  const cnt = {pending:0,cleaning:0,done:0,passed:0,ack:0};
  ROOMS.forEach(r=>{ if(cnt[r.status]!==undefined) cnt[r.status]++; });
  const done = cnt.passed+cnt.ack;
  const pct  = Math.round(done/total*100);

  // by staff
  const byS = {};
  ROOMS.forEach(r=>{
    if(!r.assignedName) return;
    byS[r.assignedName] = byS[r.assignedName]||{name:r.assignedName,done:0,total:0};
    byS[r.assignedName].total++;
    if(["done","passed","ack"].includes(r.status)) byS[r.assignedName].done++;
  });
  const sarr = Object.values(byS).sort((a,b)=>b.done-a.done);
  const maxD  = Math.max(...sarr.map(s=>s.total),1);

  // by floor
  const byF = {};
  ROOMS.forEach(r=>{
    byF[r.floor] = byF[r.floor]||{f:r.floor,done:0,total:0};
    byF[r.floor].total++;
    if(["done","passed","ack"].includes(r.status)) byF[r.floor].done++;
  });
  const farr = Object.values(byF).sort((a,b)=>a.f-b.f);

  return `
    <div class="stats">
      <div class="stat"><div class="stat-n" style="color:var(--green)">${pct}%</div><div class="stat-l">เสร็จแล้ว</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--orange)">${cnt.cleaning}</div><div class="stat-l">กำลังทำ</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--yellow)">${cnt.done}</div><div class="stat-l">รอตรวจ</div></div>
    </div>

    <div class="prog">
      <div class="prog-hd"><span>ภาพรวมทั้งหมด</span><span>${done}/${total} ห้อง</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${[
        {k:"pending", l:"รอทำ",      c:"var(--gray)"},
        {k:"cleaning",l:"กำลังทำ",   c:"var(--orange)"},
        {k:"done",    l:"รอตรวจ",    c:"var(--yellow)"},
        {k:"passed",  l:"ผ่านตรวจ",  c:"var(--green)"},
        {k:"ack",     l:"รับทราบ",   c:"#166534"},
      ].map(s=>`<div class="stat"><div class="stat-n" style="color:${s.c}">${cnt[s.k]||0}</div><div class="stat-l">${s.l}</div></div>`).join("")}
    </div>

    <div class="sec">ผลงานรายคน</div>
    ${sarr.map(s=>`
      <div class="bar-row">
        <div class="bar-lbl">${s.name}</div>
        <div style="flex:1"><div class="bar-fill" style="width:${Math.round(s.done/maxD*100)}%"></div></div>
        <div class="bar-val">${s.done}/${s.total}</div>
      </div>
    `).join("")}

    <div class="sec" style="margin-top:14px">ความคืบหน้าตามชั้น</div>
    ${farr.map(f=>`
      <div class="prog">
        <div class="prog-hd"><span>ชั้น ${f.f}</span><span>${f.done}/${f.total}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(f.done/f.total*100)}%"></div></div>
      </div>
    `).join("")}
  `;
}

// ─── MANAGER: All Rooms ─────────────────────────────
function vMgrAll(){
  const all   = ROOMS;
  const flist = ["all","pending","cleaning","done","passed","ack"];
  const shown = S.filter==="all" ? all : all.filter(r=>r.status===S.filter);
  return `
    <div class="chips">
      ${flist.map(f=>`<div class="chip ${S.filter===f?"on":""}" onclick="setF('${f}')">${f==="all"?"ทั้งหมด":SL[f]} (${f==="all"?all.length:all.filter(r=>r.status===f).length})</div>`).join("")}
    </div>
    ${shown.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">ชั้น ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        <div class="rinfo">แม่บ้าน: <b>${r.assignedName||"—"}</b>${r.startTime?` · <b>${elapsed(r.startTime)}</b>`:""}</div>
      </div>
    `).join("")}
  `;
}

// ─── ACTIONS ────────────────────────────────────────
function setF(f){ S.filter=f; render(); }

function doStatus(roomId, newStatus){
  const r = ROOMS.find(r=>r.id===roomId);
  if(!r) return;
  r.status = newStatus;
  if(newStatus==="cleaning") r.startTime = Date.now();
  if(newStatus==="done")     r.endTime   = Date.now();
  postGAS({ action:"updateStatus", roomId, status:newStatus, lineUserId:S.userId, staffName:S.name });
  toast(newStatus==="cleaning"?"▶ เริ่มทำความสะอาด":"✓ ส่งให้หัวหน้าตรวจแล้ว","ok");
  render();
}

function doAck(roomId){
  const r = ROOMS.find(r=>r.id===roomId);
  if(r) r.status = "ack";
  postGAS({ action:"ackRoom", roomId, lineUserId:S.userId, staffName:S.name });
  toast("✅ รับทราบแล้ว","ok");
  render();
}

// ─── MODALS ─────────────────────────────────────────
function openAssign(roomId){
  const r = ROOMS.find(x=>x.id===roomId);
  const opts = STAFF.map(s=>`<option value="${s.id}" data-name="${s.name}" ${r.assignedTo===s.id?"selected":""}>${s.name} (${s.nick})</option>`).join("");
  modal(`
    <div class="modal-hd"></div>
    <div class="modal-room">${roomId}</div>
    <div class="modal-fl">ชั้น ${r.floor} · Assign ห้อง</div>
    <div class="field">
      <label>เลือกแม่บ้าน</label>
      <div class="sw"><select id="m-staff">${opts}</select></div>
    </div>
    <button class="btn bg btn-lg" onclick="confirmAssign('${roomId}')">✓ Assign</button>
    <button class="btn bw btn-lg" onclick="closeModal()">ยกเลิก</button>
  `);
}

function confirmAssign(roomId){
  const sel  = document.getElementById("m-staff");
  const sid  = sel.value;
  const sname= sel.options[sel.selectedIndex].dataset.name;
  const r    = ROOMS.find(x=>x.id===roomId);
  if(r){ r.assignedTo=sid; r.assignedName=STAFF.find(s=>s.id===sid)?.nick||sname; r.status="pending"; }
  postGAS({ action:"assignRoom", roomId, staffId:sid, staffName:sname, lineUserId:S.userId, supervisorName:S.name });
  closeModal();
  toast(`Assign ให้ ${sname} แล้ว`,"ok");
  render();
}

function openInspect(roomId){
  const r = ROOMS.find(x=>x.id===roomId);
  const opts = STAFF.map(s=>`<option value="${s.id}" data-name="${s.name}" ${r.assignedTo===s.id?"selected":""}>${s.name} (${s.nick})</option>`).join("");
  modal(`
    <div class="modal-hd"></div>
    <div class="modal-room">${roomId}</div>
    <div class="modal-fl">ชั้น ${r.floor} · ตรวจสอบห้อง</div>
    <div class="rinfo" style="text-align:center;margin-bottom:12px">ทำโดย: <b>${r.assignedName}</b> · ใช้เวลา <b>${elapsed(r.startTime)}</b></div>
    <div class="field">
      <label>หมายเหตุ</label>
      <textarea id="m-note" placeholder="เช่น มุมห้องน้ำยังไม่สะอาด..."></textarea>

```
</div>
<div class="field">
  <label>กรณีไม่ผ่าน — Assign ให้ใคร</label>
  <div class="sw"><select id="m-restaff">${opts}</select></div>
</div>
<button class="btn bg btn-lg" onclick="confirmInspect('${roomId}','passed')">✅ ผ่าน — ส่ง Front Desk</button>
<button class="btn br btn-lg" onclick="confirmInspect('${roomId}','failed')">❌ ไม่ผ่าน — ให้ทำใหม่</button>
<button class="btn bw btn-lg" onclick="closeModal()">ยกเลิก</button>
```

`);
}

function confirmInspect(roomId, result){
const note  = document.getElementById(“m-note”)?.value||””;
const sel   = document.getElementById(“m-restaff”);
const nsid  = sel?.value||””;
const nsname= sel?.options[sel.selectedIndex]?.dataset.name||””;
const r = ROOMS.find(x=>x.id===roomId);
if(r){
if(result===“passed”){
r.status = “passed”;
r.note   = note;
} else {
r.status      = “pending”;
r.note        = note || “ตรวจไม่ผ่าน กรุณาทำใหม่”;
r.assignedTo  = nsid;
r.assignedName= STAFF.find(s=>s.id===nsid)?.nick||nsname;
r.startTime   = null;
r.endTime     = null;
}
}
postGAS({ action:“inspect”, roomId, result, note, newStaffId:nsid, newStaffName:nsname, lineUserId:S.userId, supervisorName:S.name });
closeModal();
toast(result===“passed”?“✅ ห้องผ่านการตรวจ”:“❌ ส่งกลับให้ทำใหม่”, result===“passed”?“ok”:“err”);
render();
}

function modal(html){
const ov = document.createElement(“div”);
ov.className = “overlay”;
ov.id = “ov”;
ov.innerHTML = `<div class="modal">${html}</div>`;
ov.addEventListener(“click”, e=>{ if(e.target===ov) closeModal(); });
document.body.appendChild(ov);
}
function closeModal(){ document.getElementById(“ov”)?.remove(); }

// ─── TOAST ───────────────────────────────────────────
let _tt;
function toast(msg,type=””){
const t = document.getElementById(“toast”);
t.textContent = msg;
t.className = “toast on “+type;
clearTimeout(_tt);
_tt = setTimeout(()=>t.className=“toast”,2400);
}

// ─── GAS POST (fire & forget) ────────────────────────
function postGAS(payload){
fetch(GAS_URL,{
method:“POST”, mode:“no-cors”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify(payload)
}).catch(()=>{});
}

// ─── ROLE SWITCHER (dev) ─────────────────────────────
function switchRole(role){
const p = ROLE_PROFILES[role];
S.role   = role;
S.userId = p.id;
S.name   = p.name;
S.tabIdx = 0;
S.filter = “all”;
render();
}

// ─── LIFF INIT ──────────────────────────────────────
function initLiff(){
if(typeof liff === “undefined”){ render(); return; }
liff.init({ liffId: LIFF_ID })
.then(()=>{
if(!liff.isLoggedIn()){ liff.login(); return; }
return liff.getProfile();
})
.then(profile=>{
if(!profile) return;
// map LINE user ID → role
// ในระบบจริงจะ query GAS แทน
S.userId = profile.userId;
S.name   = profile.displayName;
render();
})
.catch(()=>{ render(); });
}

// ─── BOOT ───────────────────────────────────────────
// แสดง UI ก่อนเลย ไม่รอ LIFF
render();

// โหลด LIFF SDK แบบ async หลัง UI render
const liffScript = document.createElement(“script”);
liffScript.src = “https://static.line-scdn.net/liff/edge/2/sdk.js”;
liffScript.onload  = initLiff;
liffScript.onerror = ()=>{}; // ถ้าโหลดไม่ได้ก็ยังใช้งานได้
document.head.appendChild(liffScript);
</script>
