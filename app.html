<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dusit Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* D-Connect Brand Palette */
  --g:#C89A5B;       /* Gold */
  --gd:#A57B3A;      /* Gold Dark */
  --gl:#F7EDD8;      /* Gold Light */
  --navy:#1F2433;    /* Deep Navy */
  --sage:#A8B59A;    /* Soft Sage */
  --saged:#4E6642;   /* Sage Dark (text) */
  --sagel:#EEF1EB;   /* Sage Light (bg) */
  --warm:#ECE9E3;    /* Warm Gray */
  /* Functional */
  --r:#C0392B;--rl:#FEF2F2;
  --o:#C45C10;--ol:#FFF3E4;
  --b:#1A56DB;--bl:#EFF6FF;
  --y:#A06010;--yl:#FFF8EC;
  --tx:#1F2433;--mu:#737373;--br:#ECE9E3;--bg:#FAF8F3;--wh:#FFFFFF;
  --rd:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--wh);display:flex;flex-direction:column}

/* Login */
#login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-mark{position:relative;display:inline-block;margin-bottom:8px}
.logo-d{font-family:Georgia,'Times New Roman',serif;font-size:74px;font-weight:700;font-style:italic;color:var(--navy);line-height:1;display:block}
.logo-spark{position:absolute;top:4px;right:-22px;font-size:22px;color:var(--g);line-height:1}
.logo-swoosh{display:block;width:90px;margin:-4px auto 0}
.logo-wordmark{font-size:18px;font-weight:700;letter-spacing:4.5px;color:var(--navy);margin-top:10px}
.logo-divider{width:36px;height:2px;background:var(--g);margin:7px auto 6px;border-radius:1px}
.logo-tagline{font-size:9px;letter-spacing:2.5px;color:var(--mu);text-transform:uppercase}
.login-box{width:100%;background:var(--wh);border:1.5px solid var(--br);border-radius:var(--rd);padding:24px}
.login-box .field{margin-bottom:14px}
.login-box label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;color:var(--navy)}
.login-box input{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--br);border-radius:9px;font-family:'Sarabun',sans-serif;font-size:16px;color:var(--tx);background:var(--wh);outline:none;transition:border-color .2s;-webkit-appearance:none}
.login-box input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(200,154,91,.15)}
.login-err{font-size:13px;color:var(--r);text-align:center;margin-top:8px;min-height:20px}

/* Main App */
#main-app{flex:1;display:none;flex-direction:column}

/* Header */
.hdr{background:var(--wh);border-bottom:1px solid var(--br);padding:12px 16px 0;position:sticky;top:0;z-index:40}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hdr-title{display:flex;align-items:center;gap:8px}
.app-icon{width:28px;height:28px;background:var(--navy);border-radius:7px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.app-icon-d{font-family:Georgia,serif;font-size:17px;font-weight:700;font-style:italic;color:#fff;line-height:1}
.app-icon-spark{position:absolute;top:1px;right:1px;font-size:7px;color:var(--g);line-height:1}
.hdr-brand{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--navy)}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-supervisor{background:#F5ECD8;color:#8A6020}
.b-housekeeper{background:var(--sagel);color:var(--saged)}
.b-frontdesk{background:#E8EBF2;color:var(--navy)}
.b-manager{background:var(--warm);color:var(--navy)}
.b-admin{background:#2D1B69;color:#fff}
.hdr-name{font-size:12px;color:var(--mu);margin-bottom:6px}
.logout-btn{font-size:11px;color:var(--mu);background:none;border:1px solid var(--br);border-radius:20px;padding:3px 9px;cursor:pointer;font-family:'Sarabun',sans-serif}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 16px;border-top:1px solid var(--br)}
.date-btn{width:28px;height:28px;border:1.5px solid var(--br);border-radius:50%;background:var(--wh);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Sarabun',sans-serif;line-height:1;color:var(--tx)}
.date-btn:disabled{opacity:.3;cursor:default}
.date-lbl{font-size:13px;font-weight:600;color:var(--tx);flex:1;text-align:center;cursor:pointer;padding:5px 8px;border-radius:8px;transition:background .15s;user-select:none}
.date-lbl:hover{background:var(--gl)}
.date-today{font-size:10px;font-weight:700;color:var(--g);background:var(--gl);padding:2px 7px;border-radius:20px}

/* Tabs */
.tabs{display:flex;border-top:1px solid var(--br)}
.tab{flex:1;padding:10px 4px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;color:var(--mu);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* Content */
.content{flex:1;padding:12px;overflow-y:auto}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Cards */
.card{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--rd);padding:13px;margin-bottom:10px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rnum{font-size:22px;font-weight:700;line-height:1}
.rfloor{font-size:11px;color:var(--mu);margin-top:2px}
.rinfo{font-size:13px;color:var(--mu);margin-bottom:8px}
.rinfo b{color:var(--tx)}
.rnote{font-size:12px;color:var(--r);background:var(--rl);padding:6px 10px;border-radius:8px;margin-bottom:8px}
.rnote-ok{font-size:12px;color:var(--saged);background:var(--sagel);padding:6px 10px;border-radius:8px;margin-bottom:8px}

/* Status */
.s{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.s-unassigned{background:#E8EBF2;color:#3B4B6B}
.s-pending{background:var(--warm);color:#555555}
.s-cleaning{background:var(--ol);color:#9A3E00}
.s-done{background:var(--bl);color:#1E40AF}
.s-passed{background:var(--sagel);color:var(--saged)}
.s-ack{background:#DCE4D6;color:#2D4A25}

/* Buttons */
.btn{height:38px;padding:0 16px;border:none;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:active{opacity:.75;transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.bg{background:var(--g);color:#fff}
.bg:hover{background:var(--gd)}
.br2{background:var(--r);color:#fff}
.bb{background:var(--saged);color:#fff}
.bw{background:var(--warm);color:var(--tx)}
.btn-lg{height:48px;font-size:15px;width:100%;justify-content:center;border-radius:var(--rd)}
.btn-full{height:44px;font-size:14px;width:100%;justify-content:center;margin-top:8px}
.acts{display:flex;gap:6px;flex-wrap:wrap}

/* Chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border:1.5px solid var(--br);border-radius:20px;font-size:12px;font-weight:600;color:var(--mu);background:var(--wh);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{border-color:var(--g);background:var(--gl);color:var(--gd)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--rd);padding:10px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:var(--mu);margin-top:2px}

/* Progress */
.prog{margin-bottom:10px}
.prog-hd{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-bottom:4px}
.prog-bar{height:6px;background:var(--warm);border-radius:20px;overflow:hidden}
.prog-fill{height:100%;background:var(--g);border-radius:20px;transition:width .4s}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px;padding:14px;background:var(--wh);border:1.5px solid var(--br);border-radius:var(--rd)}
.donut{width:90px;height:90px;border-radius:50%;position:relative;flex-shrink:0}
.donut-hole{position:absolute;inset:14px;background:var(--wh);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-size:18px;font-weight:700;color:var(--g);line-height:1}
.donut-sub{font-size:9px;color:var(--mu)}
.legend{display:flex;flex-direction:column;gap:5px;flex:1}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-val{margin-left:auto;font-weight:700;font-size:12px}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;width:52px;flex-shrink:0;text-align:right;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--warm);border-radius:4px;overflow:hidden}
.bar-fill{height:18px;background:var(--g);border-radius:4px;min-width:3px;transition:width .4s}
.bar-val{font-size:11px;font-weight:700;white-space:nowrap;width:32px;text-align:right}

/* Report */
.rpt-bars{flex:1;display:flex;gap:2px;height:16px;border-radius:4px;overflow:hidden}
.rpt-seg{height:100%;transition:width .3s;min-width:0}

/* Section label */
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin:14px 0 8px}

/* Empty */
.empty{text-align:center;padding:44px 16px;color:var(--mu)}
.empty-ic{font-size:28px;font-weight:300;color:var(--br);margin-bottom:10px;letter-spacing:4px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--wh);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:390px;max-height:88vh;overflow-y:auto}
.modal-hd{width:32px;height:4px;background:var(--br);border-radius:20px;margin:0 auto 14px}
.modal-room{font-size:30px;font-weight:700;text-align:center;color:var(--g)}
.modal-fl{font-size:12px;color:var(--mu);text-align:center;margin-bottom:14px}

/* Form */
.field{margin-bottom:12px}
.field label{font-size:13px;font-weight:600;display:block;margin-bottom:5px}
select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:9px;font-family:'Sarabun',sans-serif;font-size:15px;color:var(--tx);background:var(--wh);outline:none;-webkit-appearance:none;transition:border-color .2s}
select:focus,textarea:focus{border-color:var(--g)}
textarea{height:74px;resize:none;line-height:1.5}
.sw{position:relative}
.sw::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none}
.divider{height:1px;background:var(--br);margin:12px 0}

/* Inspect sections */
.inspect-pass{background:var(--sagel);border-radius:var(--rd);padding:12px;margin-bottom:10px}
.inspect-fail{background:var(--rl);border-radius:var(--rd);padding:12px;margin-bottom:10px}
.inspect-pass label{color:var(--saged)}
.inspect-fail label{color:var(--r)}

/* Calendar */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-lbl{font-size:15px;font-weight:700}
.cal-nav-btn{width:32px;height:32px;border:1.5px solid var(--br);border-radius:50%;background:var(--wh);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Sarabun',sans-serif;color:var(--tx)}
.cal-nav-btn:disabled{opacity:.3;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:5px 0}
.cal-d{text-align:center;padding:8px 2px;font-size:13px;border-radius:8px;cursor:pointer;transition:background .12s}
.cal-d.today{font-weight:700;color:var(--g)}
.cal-d.sel{background:var(--navy);color:#fff;font-weight:700}
.cal-d.future{color:#C8C4BC;cursor:default}
.cal-d.empty{cursor:default}
.cal-d:not(.future):not(.empty):not(.sel):hover{background:var(--warm)}

/* Performance */
.perf-avg{font-size:19px;font-weight:700;color:var(--g);line-height:1}
.perf-sub{font-size:10px;color:var(--mu)}
.perf-room-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-top:1px solid var(--br)}

/* Staff stats */
.staff-score-card{background:var(--wh);border:1.5px solid var(--br);border-radius:var(--rd);padding:13px;margin-bottom:10px}
.staff-score-name{font-size:15px;font-weight:700}
.staff-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.staff-score-item{text-align:center;background:var(--bg);border-radius:9px;padding:7px 4px}
.staff-score-val{font-size:18px;font-weight:700}
.staff-score-lbl{font-size:9px;color:var(--mu);margin-top:2px}
.score-bad{color:var(--r)}
.score-ok{color:var(--g)}
.score-warn{color:var(--o)}
/* Override modal */
.override-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ov-btn{padding:9px 4px;border:1.5px solid var(--br);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:'Sarabun',sans-serif}
.ov-btn.active{border-color:var(--g);background:var(--gl);color:var(--gd)}
/* Report mode tabs */
.rpt-mode{display:flex;gap:6px;margin-bottom:12px}
.rpt-mode-btn{padding:5px 14px;border:1.5px solid var(--br);border-radius:20px;font-size:12px;font-weight:600;color:var(--mu);background:var(--wh);cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s}
.rpt-mode-btn.on{border-color:var(--g);background:var(--gl);color:var(--gd)}
/* Live badge */
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#E74C3C;margin-right:4px;animation:pulse 1.5s infinite}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--saged)}
.toast.err{background:var(--r)}

/* Refresh dot */
.refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--g);display:inline-block;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo-wrap">
    <div class="logo-mark">
      <span class="logo-d">D</span>
      <span class="logo-spark">✦</span>
      <svg class="logo-swoosh" viewBox="0 0 90 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12 Q38 2 86 10" stroke="#C89A5B" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-wordmark">D-CONNECT</div>
    <div class="logo-divider"></div>
    <div class="logo-tagline">Housekeeping &amp; Operations</div>
  </div>
  <div style="margin-bottom:14px" id="lang-login"></div>
  <div class="login-box">
    <div class="field">
      <label id="lbl-user">Username</label>
      <input type="text" id="inp-user" placeholder="เช่น sup001" autocomplete="username" autocapitalize="none"/>
    </div>
    <div class="field">
      <label id="lbl-pass">Password</label>
      <input type="password" id="inp-pass" placeholder="••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn bg btn-lg" onclick="doLogin()" id="btn-login">เข้าสู่ระบบ</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">
        <div class="app-icon">
          <span class="app-icon-d">D</span>
          <span class="app-icon-spark">✦</span>
        </div>
        <span class="hdr-brand">D-CONNECT</span>
      </div>
      <div class="hdr-right">
        <span class="badge" id="role-badge"></span>
        <div id="hdr-lang"></div>
        <button class="logout-btn" id="btn-logout" onclick="doLogout()">ออก</button>
      </div>
    </div>
    <div class="hdr-name" id="hdr-name"></div>
    <div class="date-nav" id="date-nav"></div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content" id="content"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>

function t(k){ return (LANG_DATA[LANG]||LANG_DATA.th)[k]||k; }
function changeLang(l){
  LANG=l; localStorage.setItem("dc_lang",l);
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("on",b.dataset.lang===l));
  if(USER) showApp(); else updateLoginLang();
}
function langToggleHTML(){
  return `<div style="display:flex;gap:3px;align-items:center">
    ${["th","en","my"].map(l=>`<button class="lang-btn${LANG===l?" on":""}" data-lang="${l}" onclick="changeLang('${l}')"
      style="padding:3px 7px;font-size:10px;font-weight:700;border:1.5px solid var(--br);border-radius:12px;background:${LANG===l?"var(--navy)":"var(--wh)"};color:${LANG===l?"#fff":"var(--mu)"};cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s"
    >${l==="th"?"ไทย":l==="en"?"EN":"မြ"}</button>`).join("")}
  </div>`;
}
function updateLoginLang(){
  const el = document.querySelector("#login-screen label");
  // re-render login labels
  document.querySelectorAll(".login-box label").forEach((lb,i)=>{ lb.textContent=i===0?t("username"):t("password"); });
  document.querySelector("#btn-login").textContent=t("signin");
  document.querySelector(".logo-tagline").textContent="Housekeeping & Operations";
  document.querySelector("#lang-login")?.replaceWith(createLangToggle());
}

// ─── DATE HELPERS ────────────────────────────────────
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDateTH(s) { return fmtDate(s); } // kept for backward compat
function fmtDate(s) {
  const [yr,mo,dy] = s.split("-").map(Number);
  if(LANG==="en"){
    const m=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${dy} ${m[mo]} ${yr}`;
  }
  if(LANG==="my"){
    const m=["","ဇန်","ဖေ","မတ်","ဧပြ","မေ","ဇွန်","ဇူ","ဩ","စက်","အောက်","နို","ဒီ"];
    return `${dy} ${m[mo]} ${yr}`;
  }
  const m=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${dy} ${m[mo]} ${yr+543}`;
}
function fmtMonthTH(y, m) { return fmtMonth(y, m); } // kept for backward compat
function fmtMonth(y, m) {
  if(LANG==="en"){
    const mo=["","January","February","March","April","May","June","July","August","September","October","November","December"];
    return `${mo[m]} ${y}`;
  }
  if(LANG==="my"){
    const mo=["","ဇန်နဝါရီ","ဖေဖော်ဝါရီ","မတ်","ဧပြီ","မေ","ဇွန်","ဇူလိုင်","ဩဂုတ်","စက်တင်ဘာ","အောက်တိုဘာ","နိုဝင်ဘာ","ဒီဇင်ဘာ"];
    return `${mo[m]} ${y}`;
  }
  const mo=["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  return `${mo[m]} ${y+543}`;
}
function isToday() { return ST.date === todayISO(); }
function isPast()  { return ST.date < todayISO(); }

// ─── STATUS HELPERS ──────────────────────────────────
function SL(){ return { unassigned:t("s_unassigned"), pending:t("s_pending"), cleaning:t("s_cleaning"), done:t("s_done"), passed:t("s_passed"), ack:t("s_ack") }; }
function sb(s){ return `<span class="s s-${s}">${SL()[s]||s}</span>`; }
function elapsed(ms){
  if(!ms) return "—";
  const m = Math.floor((Date.now()-ms)/60000);
  return m < 60 ? `${m} ${t("min")}` : `${Math.floor(m/60)} ${t("hr")} ${m%60} ${t("min")}`;
}
function duration(startMs, endMs){
  if(!startMs||!endMs) return "—";
  const m = Math.floor((endMs-startMs)/60000);
  return m < 60 ? `${m} ${t("min")}` : `${Math.floor(m/60)} ${t("hr")} ${m%60} ${t("min")}`;
}

// ─── GAS CALLS ───────────────────────────────────────
async function gasCall(payload){
  try {
    await fetch(GAS_URL, { method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    return { success:true };
  } catch(e){ return { success:false, message:e.message }; }
}
async function gasGet(payload){
  try {
    const r = await fetch(GAS_URL, { method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(payload), redirect:"follow" });
    return await r.json();
  } catch(e){ return { success:false, message:e.message }; }
}

// ─── AUTO-REFRESH ────────────────────────────────────
let _refreshTimer = null;
function startAutoRefresh(){
  stopAutoRefresh();
  _refreshTimer = setInterval(async () => {
    if(!USER) return;
    const v = getView();
    if(v==="mgr_staff") return;
    const isFD  = USER.role==="frontdesk";
    const isMgr = USER.role==="manager";
    const role  = (USER.role==="admin") ? "supervisor" : USER.role;
    const res = await gasGet({ action:"getRooms", role, staffId:USER.staffId, date:ST.date, showAll: (isFD||isMgr) || undefined });
    if(res.success){
      // Only re-render if data actually changed (avoid unnecessary DOM rebuild)
      const newJson = JSON.stringify(res.rooms||[]);
      const oldJson = JSON.stringify(ST.rooms);
      if(newJson !== oldJson){ ST.rooms = res.rooms||[]; renderContent(); }
    }
  }, 60000);
}
function stopAutoRefresh(){ if(_refreshTimer){ clearInterval(_refreshTimer); _refreshTimer=null; } }

// ─── LIVE TIMER (elapsed display) ────────────────────
let _liveTimer = null;
function startLiveTimer(){
  stopLiveTimer();
  _updateElapsed();
  _liveTimer = setInterval(_updateElapsed, 30000);
}
function stopLiveTimer(){ if(_liveTimer){ clearInterval(_liveTimer); _liveTimer=null; } }
function _updateElapsed(){
  document.querySelectorAll("[data-elapsed]").forEach(el=>{
    const ms = parseInt(el.dataset.elapsed);
    if(ms) el.textContent = elapsed(ms);
  });
}

// ─── DATE NAV ────────────────────────────────────────
function updateDateNav(){
  const nav = document.getElementById("date-nav");
  if(!nav) return;
  const today = isToday();
  nav.innerHTML = `
    <button class="date-btn" onclick="changeDate(-1)">‹</button>
    <div class="date-lbl" onclick="openCalendar()">${fmtDate(ST.date)}${today?` <span class="date-today">${t("today_badge")}</span>`:""}</div>
    <button class="date-btn" onclick="changeDate(1)" ${today?"disabled":""}>›</button>
  `;
}
function changeDate(delta){
  const [y,m,d] = ST.date.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+delta);
  const nd = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
  if(nd > todayISO()) return;
  ST.date=nd; ST.filter="all"; ST.report=[]; ST.perf=[];
  updateDateNav();
  loadAndRender();
}

// ─── CALENDAR ────────────────────────────────────────
function openCalendar(){
  const [cy,cm] = ST.date.split("-").map(Number);
  let vy=cy, vm=cm;
  const today = todayISO();
  const [ty,tm] = today.split("-").map(Number);
  const dayHdr = LANG==="en" ? ["M","T","W","T","F","S","S"] :
                 LANG==="my" ? ["တ","အ","ဗ","ကြ","သ","စ","တ"] :
                               ["จ","อ","พ","พฤ","ศ","ส","อา"];

  function buildCal(){
    const daysInMonth = new Date(vy, vm, 0).getDate();
    const firstDay = new Date(vy, vm-1, 1).getDay();
    const offset = (firstDay+6)%7; // Mon-start
    const canNext = vy<ty || (vy===ty && vm<tm);
    let cells = "";
    for(let i=0;i<offset;i++) cells += `<div class="cal-d empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds = `${vy}-${String(vm).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isSel = ds===ST.date;
      const isTod = ds===today;
      const isFut = ds>today;
      const cls = `cal-d${isSel?" sel":""}${isTod&&!isSel?" today":""}${isFut?" future":""}`;
      cells += `<div class="${cls}" ${!isFut?`onclick="calSelect('${ds}')"`:""}>${d}</div>`;
    }
    document.querySelector("#cal-modal").innerHTML = `
      <div class="modal-hd"></div>
      <div class="cal-hd">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month-lbl">${fmtMonth(vy,vm)}</div>
        <button class="cal-nav-btn" ${!canNext?"disabled":""} onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dayHdr.map(d=>`<div class="cal-dh">${d}</div>`).join("")}
        ${cells}
      </div>
      <button class="btn bw btn-full" style="margin-top:12px" onclick="closeModal()">${t("btn_cancel")}</button>
    `;
  }

  window.calNav = function(delta){
    vm += delta;
    if(vm>12){vm=1;vy++;}
    if(vm<1){vm=12;vy--;}
    buildCal();
  };
  window.calSelect = function(ds){
    ST.date=ds; ST.filter="all"; ST.report=[]; ST.perf=[];
    closeModal();
    updateDateNav();
    loadAndRender();
  };

  const ov = document.createElement("div");
  ov.className="overlay"; ov.id="ov";
  ov.innerHTML=`<div class="modal" id="cal-modal"></div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  buildCal();
}

// ─── LOAD DATA ───────────────────────────────────────
async function loadAndRender(){
  const v = getView();
  if(v==="mgr_staff"){  await loadStaffReport();  return; }
  showLoader();
  const isFD  = USER.role==="frontdesk";
  const isMgr = USER.role==="manager";
  const role  = (USER.role==="admin") ? "supervisor" : USER.role;
  const res = await gasGet({ action:"getRooms", role, staffId:USER.staffId, date:ST.date, showAll: (isFD||isMgr) || undefined });
  if(res.success) ST.rooms = res.rooms||[];
  if((USER.role==="supervisor"||USER.role==="admin") && ST.staff.length===0){
    const sr = await gasGet({ action:"getStaff" });
    if(sr.success) ST.staff = sr.staff||[];
  }
  renderContent();
}

function getStaffDateRange(){
  const mode = ST.staffMode||"30d";
  if(mode==="7d"||mode==="30d"||mode==="90d"){
    const days = mode==="7d"?7:mode==="30d"?30:90;
    const end = ST.date;
    const dt = new Date(ST.date); dt.setDate(dt.getDate()-(days-1));
    const start = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    return { start, end };
  }
  if(mode==="month"){
    const y = ST.staffYear || new Date().getFullYear();
    const m = ST.staffMonth || (new Date().getMonth()+1);
    const start = `${y}-${String(m).padStart(2,"0")}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const end   = `${y}-${String(m).padStart(2,"0")}-${lastDay}`;
    return { start, end };
  }
  if(mode==="year"){
    const y = ST.staffYear || new Date().getFullYear();
    return { start:`${y}-01-01`, end:`${y}-12-31` };
  }
  return { start:"2020-01-01", end:ST.date };
}

async function loadStaffReport(){
  showLoader();
  const { start, end } = getStaffDateRange();
  const res = await gasGet({ action:"getStaffReport", startDate:start, endDate:end });
  if(res.success) ST.staffReport = res.byStaff||[];
  renderContent();
}

// ─── SUPERVISOR: เวลาทำงาน ───────────────────────────
function vSupPerf(){
  const rooms = ST.rooms;
  if(rooms.length===0)
    return `<div class="empty"><div class="empty-ic">···</div>${isPast()?t("no_data_date"):t("no_data")}</div>`;

  const cleaning  = rooms.filter(r=>r.status==="cleaning"&&r.startTime);
  const completed = rooms.filter(r=>["done","passed"].includes(r.status)&&r.startTime&&r.endTime);

  const byStaff = {};
  completed.forEach(r=>{
    const n = r.assignedName||"—";
    if(!byStaff[n]) byStaff[n]={ name:n, rooms:[], totalMs:0 };
    byStaff[n].rooms.push(r);
    byStaff[n].totalMs += (r.endTime - r.startTime);
  });
  const staffArr = Object.values(byStaff).sort((a,b)=>(a.totalMs/a.rooms.length)-(b.totalMs/b.rooms.length));

  return `
    <div class="sec"><span class="live-dot"></span>${t("sec_realtime")} (${cleaning.length} ${t("rooms_count")})</div>
    ${cleaning.length===0?`<div style="font-size:13px;color:var(--mu);padding:4px 0 10px">${t("no_cleaning")}</div>`:""}
    ${cleaning.map(r=>`
      <div class="card">
        <div class="card-hd">
          <div><div class="rnum">${r.id}</div><div class="rfloor">${t("floor")} ${r.floor}</div></div>
          ${sb(r.status)}
        </div>
        <div class="rinfo">${r.assignedName||"—"} · ${t("started")} <b data-elapsed="${r.startTime}">—</b></div>
      </div>
    `).join("")}

    <div class="sec" style="margin-top:6px">${t("sec_completed")} (${completed.length} ${t("rooms_count")})</div>

// ─── MANAGER: Dashboard ──────────────────────────────
function vMgrDash(){
  const rooms = ST.rooms;
  const total = rooms.length;
  const cnt = {unassigned:0,pending:0,cleaning:0,done:0,passed:0};
  rooms.forEach(r=>{ if(cnt[r.status]!==undefined) cnt[r.status]++; });
  const finished = cnt.passed;
  const pct = total ? Math.round(finished/total*100) : 0;

  const segs = [
    {k:"passed",     c:"#A8B59A", get label(){ return SL()["passed"]; }},
    {k:"done",       c:"#1A56DB", get label(){ return SL()["done"]; }},
    {k:"cleaning",   c:"#C45C10", get label(){ return SL()["cleaning"]; }},
    {k:"pending",    c:"#D8D4CD", get label(){ return SL()["pending"]; }},
    {k:"unassigned", c:"#B8C0CC", get label(){ return SL()["unassigned"]; }},
  ];
  let cumPct = 0;
  const gradParts = segs.map(s=>{
    const p = total ? (cnt[s.k]||0)/total*100 : 0;
    const from = cumPct; cumPct += p;
    return `${s.c} ${from.toFixed(1)}% ${cumPct.toFixed(1)}%`;
  }).join(", ");

  const byS = {};
  rooms.forEach(r=>{
    if(!r.assignedName) return;
    byS[r.assignedName] = byS[r.assignedName]||{name:r.assignedName,done:0,total:0};
    byS[r.assignedName].total++;
    if(["done","passed"].includes(r.status)) byS[r.assignedName].done++;
  });
  const sarr = Object.values(byS).sort((a,b)=>b.done-a.done);
  const maxT = Math.max(...sarr.map(s=>s.total),1);

  const byF = {};
  rooms.forEach(r=>{
    byF[r.floor] = byF[r.floor]||{f:r.floor,done:0,total:0};
    byF[r.floor].total++;
    if(["done","passed"].includes(r.status)) byF[r.floor].done++;
  });
  const farr = Object.values(byF).sort((a,b)=>a.f-b.f);

  return `
    ${total===0?`<div class="empty"><div class="empty-ic">···</div>${t("no_data_date")}</div>`:`

    <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px">${fmtDateTH(ST.date)}</div>

    <div class="donut-wrap">
      <div class="donut" style="background:conic-gradient(${gradParts})">
        <div class="donut-hole">
          <div class="donut-pct">${pct}%</div>
          <div class="donut-sub">${t("donut_done")}</div>
        </div>
      </div>
      <div class="legend">
        ${segs.map(s=>`
          <div class="leg-item">
            <div class="leg-dot" style="background:${s.c}"></div>
            <span>${s.label}</span>
            <span class="leg-val">${cnt[s.k]||0}</span>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(2,1fr);margin-bottom:4px">
      <div class="stat"><div class="stat-n" style="color:var(--saged)">${finished}</div><div class="stat-l">${SL()["passed"]}</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--o)">${cnt.cleaning+cnt.done}</div><div class="stat-l">${t("in_progress_section")}</div></div>
      <div class="stat"><div class="stat-n" style="color:#555">${cnt.pending}</div><div class="stat-l">${SL()["pending"]}</div></div>
      <div class="stat"><div class="stat-n" style="color:#3B4B6B">${cnt.unassigned}</div><div class="stat-l">${SL()["unassigned"]}</div></div>
    </div>

    <div class="prog" style="margin-bottom:16px">
      <div class="prog-hd"><span>${t("overview")} ${total} ${t("rooms_count")}</span><span>${finished} ${t("rooms_done_count")}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>

    <div style="border-top:2px solid var(--br);margin-bottom:12px"></div>

    <div class="sec">${t("sec_by_staff")}</div>
    ${sarr.length===0?`<div style="font-size:13px;color:var(--mu);padding:8px 0">${t("no_assign_yet")}</div>`:""}
    ${sarr.map(s=>`
      <div class="bar-row">
        <div class="bar-lbl">${s.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.done/maxT*100)}%"></div></div>
        <div class="bar-val">${s.done}/${s.total}</div>
      </div>
    `).join("")}

    <div class="sec" style="margin-top:14px">${t("sec_by_floor")}</div>
    ${farr.map(f=>{
      const p = Math.round(f.done/f.total*100);
      return `<div class="prog">
        <div class="prog-hd"><span>${t("floor")} ${f.f}</span><span style="color:${p===100?"var(--saged)":p>50?"var(--g)":"var(--mu)"}">${f.done}/${f.total} (${p}%)</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${p===100?"var(--saged)":p>50?"var(--g)":"var(--o)"}"></div></div>
      </div>`;
    }).join("")}
    `}
  `;
}

// generate full 250-room hotel list (floors 8-38, no 13, no *4)
function allHotelRooms(){
  const rooms=[];
  for(let f=8;f<=38;f++){
    if(f===13) continue;
    for(let n=1;n<=9;n++){
      const id=String(f)+String(n).padStart(2,"0");
      if(id.endsWith("4")) continue;
      rooms.push({id,floor:f});
    }
  }
  return rooms;
}

// ─── MANAGER: สถิติพนักงาน (flexible date range) ────
function vMgrStaff(){
  const data = ST.staffReport||[];
  const mode = ST.staffMode||"30d";

  // Period label
  const { start, end } = getStaffDateRange();
  const periodLabel = (()=>{
    if(mode==="month") return fmtMonth(+(ST.staffYear||new Date().getFullYear()), +(ST.staffMonth||(new Date().getMonth()+1)));
    if(mode==="year"){
      const y = +(ST.staffYear||new Date().getFullYear());
      return LANG==="th"?`ปี ${y+543}`:`Year ${y}`;
    }
    return `${fmtDateTH(start)} – ${fmtDateTH(end)}`;
  })();

  const curYear  = new Date().getFullYear();
  const years    = [curYear-2, curYear-1, curYear];
  const selYear  = +(ST.staffYear||curYear);
  const selMonth = +(ST.staffMonth||(new Date().getMonth()+1));
  const moNames  = LANG==="en"
    ? ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
    : LANG==="my"
      ? ["","ဇန်","ဖေဖ","မတ်","ဧပြီ","မေ","ဇွန်","ဇူ","ဩဂ","စက်","အောက်","နို","ဒီ"]
      : ["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

  const selSt = `padding:6px 26px 6px 10px;border:1.5px solid var(--br);border-radius:9px;font-family:'Sarabun',sans-serif;font-size:12px;color:var(--tx);background:var(--wh);outline:none;-webkit-appearance:none;cursor:pointer;width:100%`;

  const modeBtns = `<div class="rpt-mode" style="flex-wrap:wrap">
    ${["7d","30d","90d","month","year"].map(m=>{
      const lbl = m==="7d"?"7 วัน":m==="30d"?"30 วัน":m==="90d"?"90 วัน":m==="month"?(LANG==="en"?"Month":"เดือน"):(LANG==="en"?"Year":"ปี");
      return `<button class="rpt-mode-btn ${mode===m?"on":""}" onclick="ST.staffMode='${m}';ST.staffReport=[];loadStaffReport()">${lbl}</button>`;
    }).join("")}
  </div>`;

  const datePickers = mode==="month" ? `
    <div style="display:flex;gap:8px;margin:6px 0 10px">
      <div style="flex:1;position:relative">
        <select style="${selSt}" onchange="ST.staffMonth=+this.value;ST.staffReport=[];loadStaffReport()">
          ${moNames.slice(1).map((n,i)=>`<option value="${i+1}" ${selMonth===i+1?"selected":""}>${n}</option>`).join("")}
        </select>
        <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--mu);font-size:10px">▾</span>
      </div>
      <div style="flex:1;position:relative">
        <select style="${selSt}" onchange="ST.staffYear=+this.value;ST.staffReport=[];loadStaffReport()">
          ${years.map(y=>`<option value="${y}" ${selYear===y?"selected":""}>${LANG==="th"?y+543:y}</option>`).join("")}
        </select>
        <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--mu);font-size:10px">▾</span>
      </div>
    </div>` :
    mode==="year" ? `
    <div style="margin:6px 0 10px;position:relative;max-width:140px">
      <select style="${selSt}" onchange="ST.staffYear=+this.value;ST.staffReport=[];loadStaffReport()">
        ${years.map(y=>`<option value="${y}" ${selYear===y?"selected":""}>${LANG==="th"?y+543:y}</option>`).join("")}
      </select>
      <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--mu);font-size:10px">▾</span>
    </div>` : "";

  if(data.length===0) return `
    ${modeBtns}
    ${datePickers}
    <div class="loader" style="padding:32px"><div class="spinner"></div></div>`;

  // Sorting & stats
  const sorted   = [...data].sort((a,b)=>b.completedRooms-a.completedRooms||a.avgDuration-b.avgDuration);
  const maxRooms = Math.max(...data.map(s=>s.completedRooms||0), 1);
  const maxAvg   = Math.max(...data.map(s=>s.avgDuration||0), 1);
  const top3     = sorted.slice(0, Math.min(3, sorted.length));
  const n        = sorted.length;
  const bottom3  = n >= 4 ? sorted.slice(Math.max(n-3, top3.length)) : [];

  function perfCard(s, rank, type){
    const avgMin = s.avgDuration>0 ? Math.round(s.avgDuration/60000) : 0;
    const pct    = s.totalRooms>0  ? Math.round(s.completedRooms/s.totalRooms*100) : 0;
    const bg     = type==="top"  ? "rgba(200,154,91,.1)"  : "rgba(196,92,16,.08)";
    const bdr    = type==="top"  ? "rgba(200,154,91,.4)"  : "rgba(196,92,16,.3)";
    const medal  = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"";
    const rankCol= type==="top"  ? "var(--g)" : "var(--o)";
    return `<div style="background:${bg};border:1.5px solid ${bdr};border-radius:10px;padding:10px 11px;flex:1;min-width:0">
      <div style="font-size:11px;font-weight:700;color:${rankCol};margin-bottom:3px">${medal} #${rank}</div>
      <div style="font-size:12px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
      <div style="font-size:10px;color:var(--mu);margin-top:2px">${s.completedRooms} ${LANG==="en"?"rooms":"ห้อง"} · ${pct}%</div>
      ${avgMin>0?`<div style="font-size:10px;color:${avgMin>45?"var(--o)":"var(--saged)"};margin-top:1px">⏱ ${avgMin}'</div>`:""}
    </div>`;
  }

  return `
    ${modeBtns}
    ${datePickers}
    <div style="font-size:11px;color:var(--mu);margin:4px 0 12px;font-weight:600">${periodLabel}</div>

    <div class="sec" style="margin-top:0">🏆 Top Performer</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${top3.map((s,i)=>perfCard(s,i+1,"top")).join("")}
    </div>

    ${bottom3.length>0?`
    <div class="sec">⚠ Bottom Performer</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${bottom3.map((s,i)=>perfCard(s,n-bottom3.length+i+1,"bot")).join("")}
    </div>`:""}

// ─── ACTIONS ─────────────────────────────────────────
async function doStatus(roomId, newStatus){
  if(!isToday()){ toast(t("toast_no_edit_past"),"err"); return; }
  const r = ST.rooms.find(x=>x.id===roomId);
  if(!r) return;
  r.status=newStatus;
  if(newStatus==="cleaning") r.startTime=Date.now();
  if(newStatus==="done")     r.endTime=Date.now();
  renderContent();
  await gasCall({ action:"updateStatus", roomId, status:newStatus, staffId:USER.staffId, staffName:USER.name, date:ST.date });
  toast(newStatus==="cleaning"?t("toast_start_clean"):t("toast_sent_inspect"),"ok");
}


async function doInitDaily(){
  const res = await gasGet({ action:"initDaily", date:ST.date });
  if(res.success){
    toast(`${res.count} ${t("rooms_count")} ${t("toast_created")}`,"ok");
    ST.staff=[];
    await loadAndRender();
  } else {
    toast(res.message||t("err_generic"),"err");
  }
}

function openInspect(roomId){
  const r    = ST.rooms.find(x=>x.id===roomId);
  const opts = ST.staff.length
    ? ST.staff.map(s=>`<option value="${s.id}" data-name="${s.name}" data-nick="${s.nickname}" ${r.assignedTo===s.id?"selected":""}>${s.name} (${s.nickname})</option>`).join("")
    : `<option value="${r.assignedTo}" selected>${r.assignedName}</option>`;

async function confirmInspect(roomId, result){
  const note   = result==="passed"
    ? (document.getElementById("m-note-pass")?.value||"")
    : (document.getElementById("m-note-fail")?.value||"");
  const sel    = document.getElementById("m-restaff");
  const nsid   = sel?.value||"";
  const nsname = sel?.options[sel.selectedIndex]?.dataset.name||"";
  const nsnick = sel?.options[sel.selectedIndex]?.dataset.nick||nsname;
  const r = ST.rooms.find(x=>x.id===roomId);
  if(r){
    if(result==="passed"){
      r.status="passed"; r.note=note;
    } else {
      r.status="pending"; r.note=note||t("note_fail_default");
      r.assignedTo=nsid; r.assignedName=nsnick;
      r.startTime=null; r.endTime=null;
    }
  }
  closeModal(); renderContent();
  await gasCall({ action:"inspect", roomId, result, note, newStaffId:nsid, newStaffName:nsname, supervisorId:USER.staffId, supervisorName:USER.name, date:ST.date });
  toast(result==="passed"?t("toast_pass_inspect"):t("toast_fail_inspect"), result==="passed"?"ok":"err");
}

// ─── MODAL HELPERS ───────────────────────────────────
function showModal(html){
  const ov = document.createElement("div");
  ov.className="overlay"; ov.id="ov";
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal(){ document.getElementById("ov")?.remove(); }

// ─── TOAST ───────────────────────────────────────────
let _tt;
function toast(msg, type=""){
  const t = document.getElementById("toast");
  t.textContent=msg; t.className="toast on "+type;
  clearTimeout(_tt);
  _tt = setTimeout(()=>t.className="toast", 2400);
}

// ─── AUTO ASSIGN ──────────────────────────────────────
function openAutoAssign(){
  if(!isToday()){ toast(t("toast_no_edit_past"),"err"); return; }
  if(ST.staff.length===0){ toast(t("no_staff_available"),"err"); return; }

  // Pending rooms = all 250 minus already-assigned
  const sheetMap={};
  ST.rooms.forEach(r=>{ sheetMap[r.id]=r; });
  const pending = allHotelRooms().filter(r=>{
    const s=sheetMap[r.id];
    return !s || s.status==="unassigned";
  });

  // ST.staff already contains only active housekeepers (filtered by GAS getStaff)
  const hks = ST.staff;
  if(!hks.length){ toast(t("no_staff_available"),"err"); return; }

  const base = Math.floor(pending.length/hks.length);
  const rem  = pending.length % hks.length;

  const inp = `background:var(--wh);border:1.5px solid var(--br);border-radius:8px;width:58px;text-align:center;font-size:15px;font-weight:700;padding:5px 4px;font-family:'Sarabun',sans-serif;color:var(--tx)`;

  const rows = hks.map((h,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--br)">
      <div style="flex:1;font-size:14px;font-weight:600">${h.name}<br><span style="font-size:11px;color:var(--mu);font-weight:400">${h.nickname||""}</span></div>
      <input id="aa-${h.id}" type="number" min="0" max="${pending.length}" value="${i<rem?base+1:base}"
        style="${inp}" oninput="aaUpdateTotal()"/>
      <span style="font-size:12px;color:var(--mu);width:28px">${t("auto_assign_rooms")}</span>
    </div>`).join("");

  const html=`
    <div class="modal-hd"></div>
    <div class="modal-room">${t("auto_assign_title")}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 4px">
      <span style="font-size:13px;color:var(--mu)">${t("auto_assign_pending")}: <b style="color:var(--tx)">${pending.length}</b></span>
      <button class="btn bw" style="font-size:12px;padding:5px 12px" onclick="aaDistribute(${pending.length},${hks.length})">${t("auto_assign_distribute")}</button>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--o);margin-bottom:8px" id="aa-warn"></div>
    <div style="max-height:340px;overflow-y:auto">${rows}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--br)">
      <span style="font-size:13px;color:var(--mu)">${t("auto_assign_total")}: <b id="aa-total" style="color:var(--tx)">0</b> ${t("auto_assign_rooms")}</span>
      <button class="btn bg" id="aa-go" onclick="doAutoAssign()">${t("auto_assign_go")}</button>
    </div>`;

  const ov=document.createElement("div"); ov.className="overlay"; ov.id="ov";
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener("click",e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  // Store pending+hks in closure-accessible vars
  window._aaPending = pending;
  window._aaHks     = hks;
  aaUpdateTotal();
}

function aaUpdateTotal(){
  const hks = window._aaHks||[];
  let total=0;
  hks.forEach(h=>{ total+=parseInt(document.getElementById("aa-"+h.id)?.value||0); });
  const el=document.getElementById("aa-total"); if(el) el.textContent=total;
  const pending=(window._aaPending||[]).length;
  const warn=document.getElementById("aa-warn");
  if(warn) warn.textContent = total>pending ? `⚠ เกิน ${total-pending} ห้อง — ลดลงก่อน` : "";
}

function aaDistribute(total,n){
  const hks=window._aaHks||[];
  const base=Math.floor(total/n), rem=total%n;
  hks.forEach((h,i)=>{ const el=document.getElementById("aa-"+h.id); if(el) el.value=i<rem?base+1:base; });
  aaUpdateTotal();
}

async function doAutoAssign(){
  const pending = window._aaPending||[];
  const hks     = window._aaHks||[];
  let total=0;
  hks.forEach(h=>{ total+=parseInt(document.getElementById("aa-"+h.id)?.value||0); });
  if(total>pending.length){ toast(`⚠ เกิน ${total-pending.length} ห้อง`,"err"); return; }
  if(total===0){ toast(t("no_assign_yet"),"err"); return; }

  // Build assignments: distribute rooms in floor order
  const assignments=[];
  let roomIdx=0;
  for(const h of hks){
    const count=parseInt(document.getElementById("aa-"+h.id)?.value||0);
    for(let i=0;i<count;i++){
      if(roomIdx>=pending.length) break;
      const r=pending[roomIdx++];
      assignments.push({ roomId:r.id, floor:r.floor, staffId:h.id, staffName:h.name });
    }
  }

  const btn=document.getElementById("aa-go");
  if(btn){ btn.disabled=true; btn.textContent="กำลังมอบหมาย..."; }

  closeModal();
  showLoader();

  // Optimistic update
  const map={};
  assignments.forEach(a=>{ map[a.roomId]=a; });
  ST.rooms = allHotelRooms().map(r=>{
    const existing=ST.rooms.find(x=>x.id===r.id);
    const assign=map[r.id];
    if(assign) return {...(existing||r), status:"pending", assignedTo:assign.staffId, assignedName:assign.staffName};
    return existing||{...r, status:"unassigned", assignedTo:"", assignedName:""};
  });
  renderContent();

  const res = await gasGet({ action:"bulkAssign", assignments, date:ST.date });
  if(res.success){
    toast(`${t("auto_assign_done")} — ${res.count} ${t("auto_assign_rooms")} ✓`,"ok");
    await loadAndRender();
  } else {
    toast(res.message||t("err_generic"),"err");
    await loadAndRender();
  }
}
